<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Istigfar + Ilmu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#020617" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root {
      --bg: #020617;
      --text: #e5e7eb;
      --subtext: #9ca3af;
      --border-soft: #1f2937;
      --border-mid: #4b5563;
      --grad1: #6366f1;
      --grad2: #8b5cf6;
      --danger: #f97373;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body {
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
      color: var(--text);
      min-height: 100dvh; 
      display: flex;
      align-items: stretch;
      justify-content: center;
      overscroll-behavior-y: none;
      overflow: hidden; 
    }
    .app-shell {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      max-height: 100dvh;
    }
    .card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 18px;
      border: 1px solid var(--border-soft);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
      padding: 20px;
      backdrop-filter: blur(18px);
      flex: 1; 
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden; 
      min-height: 0; 
    }
    .title-main { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 6px; }
    .subtitle { text-align: center; font-size: 0.9rem; color: var(--subtext); margin-bottom: 18px; }
    
    .btn {
      width: 100%; border-radius: 999px; padding: 12px 16px; border: 1px solid transparent;
      background-image: linear-gradient(var(--bg), var(--bg)), linear-gradient(135deg, var(--grad1), var(--grad2));
      background-origin: border-box; background-clip: padding-box, border-box;
      color: var(--text); font-weight: 600; cursor: pointer; display: inline-flex;
      align-items: center; justify-content: center; gap: 8px; transition: transform 0.12s ease;
    }
    .btn:active { transform: scale(0.98); }
    .btn-secondary { background-image: none; background: rgba(15, 23, 42, 0.9); border-color: var(--border-mid); }
    .btn-sm { width: auto; padding: 6px 12px; font-size: 0.8rem; }
    .btn-active { background: var(--grad1) !important; color: white; border-color: transparent; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }

    .section { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .section.active { display: flex; }
    .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; z-index: 10; flex-shrink: 0; }
    
    .counter-circle {
      width: 210px; height: 210px; border-radius: 50%;
      border: 2px solid rgba(148, 163, 184, 0.5);
      background: radial-gradient(circle at top, rgba(79, 70, 229, 0.15), rgba(15, 23, 42, 0.95));
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      margin: 10px auto; box-shadow: 0 18px 40px rgba(0, 0, 0, 0.4);
      z-index: 5; flex-shrink: 0;
    }
    .counter-value { font-size: 3rem; font-weight: 700; }
    
    #fact-display-box {
      margin-top: 15px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.4);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      color: #fff;
      display: none; 
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 90px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
      transition: all 0.3s ease;
      white-space: pre-wrap; 
      flex-shrink: 0;
    }
    #fact-display-box.show {
      display: flex;
      animation: fadeIn 0.3s ease-out;
    }
    .fact-title-label {
      font-size: 0.75rem;
      color: var(--grad2);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .fact-content-text {
      font-size: 1rem;
      font-weight: 500;
      line-height: 1.4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .list { 
      margin-top: 10px; 
      border-radius: 14px; 
      border: 1px solid var(--border-soft); 
      background: rgba(15, 23, 42, 0.9); 
      flex: 1; 
      overflow-y: auto; 
      min-height: 0; 
      padding-bottom: 20px;
    }
    
    .drawer-card { background: rgba(30, 41, 59, 0.5); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border-soft); }
    input.drawer-title { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-mid); color: #fff; font-weight: 700; padding: 4px; margin-bottom: 8px; outline: none; }
    textarea.drawer-notes { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border-soft); color: var(--subtext); border-radius: 8px; padding: 8px; font-size: 0.85rem; min-height: 80px; resize: none; outline: none; }
    
    .footer { margin-top: auto; padding-top: 10px; text-align: center; font-size: 0.7rem; color: var(--subtext); flex-shrink: 0; }
    .mt-8 { margin-top: 8px; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="card">

      <section id="section-login" class="section active">
        <div style="margin: auto 0;">
          <div class="title-main">Istigfar</div>
          <div class="subtitle">Tasbih & Laci Fakta Pintar.</div>
          <button id="btn-login-google" class="btn">Login dengan Google</button>
        </div>
      </section>

      <section id="section-home" class="section">
        <div class="topbar">
          <div class="topbar-title">Menu Utama</div>
          <button id="btn-logout" class="btn btn-secondary btn-sm">Logout</button>
        </div>
        <div class="stack" style="display:flex; flex-direction:column; gap:10px;">
          <button id="btn-go-tasbih" class="btn">Kembali ke Tasbih</button>
          <button id="btn-go-history" class="btn btn-secondary">Lihat Sejarah</button>
          <button id="btn-go-notes" class="btn btn-secondary">Nota Refleksi</button>
        </div>
        <div class="footer">Repo: Stressbetul / Istigfar</div>
      </section>

      <section id="section-tasbih" class="section">
        <div class="topbar">
          <div style="display: flex; gap: 6px;">
            <button id="btn-back-home" class="btn btn-secondary btn-sm">Menu</button>
            <button id="btn-toggle-fact" class="btn btn-secondary btn-sm">Mode Fakta: OFF</button>
          </div>
          <button id="btn-go-drawer" class="btn btn-secondary btn-sm">Laci Fakta</button>
        </div>

        <div id="tasbih-circle" class="counter-circle">
          <div id="tasbih-count" class="counter-value">10000</div>
          <div style="font-size:0.7rem; color:var(--subtext);">Baki Hari Ini</div>
        </div>

        <div id="fact-display-box">
          <div id="fact-title" class="fact-title-label"></div>
          <div id="fact-content" class="fact-content-text">Sedia untuk mula...</div>
        </div>

        <div style="text-align:center; margin-top: auto;">
           <div id="tasbih-date-label" style="font-size:0.8rem; opacity:0.7;"></div>
        </div>
      </section>

      <section id="section-drawer" class="section">
        <div class="topbar">
          <button id="btn-back-tasbih-drawer" class="btn btn-secondary btn-sm">← Tasbih</button>
          <div class="topbar-title">Laci Kamus/Fakta</div>
        </div>
        <button id="btn-add-laci" class="btn btn-sm mt-8">Tambah Laci Baru</button>
        <div class="list mt-8" id="drawer-list" style="padding: 10px;"></div>
      </section>

      <section id="section-history" class="section">
        <button id="btn-back-tasbih-history" class="btn btn-secondary btn-sm" style="align-self: flex-start; margin-bottom: 10px;">← Tasbih</button>
        <div class="list" id="history-list"></div>
      </section>

      <section id="section-notes" class="section">
        <button id="btn-back-tasbih-notes" class="btn btn-secondary btn-sm" style="align-self: flex-start; margin-bottom: 10px;">← Tasbih</button>
        <button id="btn-add-note" class="btn btn-sm mt-8">Tambah Nota</button>
        <div class="list mt-8" id="notes-list"></div>
      </section>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, collection, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAGLX_xxH_dQ06epX4XCXtuSHN0DwZFMjA",
      authDomain: "stress-auti-action.firebaseapp.com",
      projectId: "stress-auti-action",
      storageBucket: "stress-auti-action.firebasestorage.app",
      messagingSenderId: "792580618622",
      appId: "1:792580618622:web:f0efb1d630e795584d5b2f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Elements
    const sections = ['login', 'home', 'tasbih', 'drawer', 'history', 'notes'];
    const dom = {};
    sections.forEach(s => dom[s] = document.getElementById(`section-${s}`));

    const tasbihCountEl = document.getElementById("tasbih-count");
    const drawerList = document.getElementById("drawer-list");
    const btnToggleFact = document.getElementById("btn-toggle-fact");
    
    // Elemen Flashcard
    const factDisplayBox = document.getElementById("fact-display-box");
    const factTitleEl = document.getElementById("fact-title");
    const factContentEl = document.getElementById("fact-content");

    let currentUser = null;
    let currentTasbihData = null;
    let factMode = false;
    
    // Array Fakta
    let allFacts = []; 
    let currentFactIndex = 0;

    function showSection(name) {
      Object.values(dom).forEach(s => s.classList.remove("active"));
      dom[name].classList.add("active");
    }

    // Fungsi Papar Fakta Kekal (Dengan Memori)
    function cycleFact() {
      if (!factMode || allFacts.length === 0) return;
      
      const currentData = allFacts[currentFactIndex];
      factTitleEl.textContent = currentData.title ? `[ ${currentData.title} ]` : '';
      
      if (currentData.isTamat) {
        factContentEl.innerHTML = `<span style="color: #fca5a5; font-weight: bold;">${currentData.text}</span>`;
      } else {
        factContentEl.textContent = currentData.text;
      }

      // Gerak ke fakta seterusnya
      currentFactIndex = (currentFactIndex + 1) % allFacts.length;
      
      // SIMPAN MEMORI: Simpan kedudukan index seterusnya ke dalam peranti telefon
      localStorage.setItem('istigfar_fact_index', currentFactIndex);
    }

    async function decrementTasbih() {
      if (!currentUser || !currentTasbihData || currentTasbihData.done) return;
      let remaining = currentTasbihData.remaining - 1;
      if (remaining < 0) return;
      
      currentTasbihData.remaining = remaining;
      currentTasbihData.done = (remaining <= 0);
      
      const key = todayKey();
      await setDoc(doc(db, "users", currentUser.uid, "tasbih", key), {
        ...currentTasbihData, updatedAt: Date.now()
      });
      
      tasbihCountEl.textContent = remaining;
      
      cycleFact();
    }

    function todayKey() {
      const n = new Date();
      return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
    }

    // Sync Laci Fakta
    function subscribeDrawer() {
      const q = query(collection(db, "users", currentUser.uid, "drawer"), orderBy("createdAt", "asc"));
      onSnapshot(q, (snap) => {
        drawerList.innerHTML = "";
        allFacts = [];
        snap.forEach(d => {
          const data = d.data();
          const id = d.id;
          const tajukLaci = data.title || "Tiada Tajuk";
          
          if(data.notes) {
            const lines = data.notes.split('\n').filter(l => l.trim() !== "");
            if (lines.length > 0) {
              lines.forEach(line => {
                allFacts.push({ title: tajukLaci, text: line, isTamat: false });
              });
              
              allFacts.push({ title: tajukLaci, text: "✅ Laci Tamat. Sapu/tekan untuk tajuk seterusnya.", isTamat: true });
            }
          }

          const div = document.createElement("div");
          div.className = "drawer-card";
          div.innerHTML = `
            <input class="drawer-title" value="${data.title || ''}" placeholder="Tajuk (Cth: Kamus BI Level 1)">
            <textarea class="drawer-notes" placeholder="Apple&#10;Banana&#10;Cat">${data.notes || ''}</textarea>
            <div style="text-align: right;">
              <button class="btn btn-secondary btn-sm btn-del-laci" style="color:var(--danger); border-color:var(--danger);">Padam</button>
            </div>
          `;
          
          const titleInp = div.querySelector(".drawer-title");
          const notesInp = div.querySelector(".drawer-notes");

          titleInp.onchange = () => updateDoc(doc(db, "users", currentUser.uid, "drawer", id), { title: titleInp.value });
          notesInp.onchange = () => updateDoc(doc(db, "users", currentUser.uid, "drawer", id), { notes: notesInp.value });
          div.querySelector(".btn-del-laci").onclick = () => deleteDoc(doc(db, "users", currentUser.uid, "drawer", id));

          drawerList.appendChild(div);
        });

        // DAPATKAN MEMORI DARI PERANTI TELEFON
        let savedIndex = parseInt(localStorage.getItem('istigfar_fact_index')) || 0;
        
        // Pastikan index tak terlebih dari jumlah nota terkini (jika user ada padam nota)
        if (savedIndex >= allFacts.length) savedIndex = 0;
        currentFactIndex = savedIndex;
        
        // Placeholder berdasarkan memori terakhir
        if (factMode && allFacts.length > 0) {
          factTitleEl.textContent = `[ ${allFacts[currentFactIndex].title} ]`;
          factContentEl.textContent = "Sapu/Tekan skrin untuk sambung perkataan...";
        } else if (allFacts.length === 0) {
          factTitleEl.textContent = "";
          factContentEl.textContent = "Laci kosong. Sila tambah fakta.";
        }
      });
    }

    // Auth & Init
    setPersistence(auth, browserLocalPersistence);
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        showSection('tasbih');
        const key = todayKey();
        const ref = doc(db, "users", user.uid, "tasbih", key);
        const snap = await getDoc(ref);
        if(!snap.exists()) {
          currentTasbihData = { remaining: 10000, done: false, dateKey: key };
          await setDoc(ref, currentTasbihData);
        } else {
          currentTasbihData = snap.data();
        }
        tasbihCountEl.textContent = currentTasbihData.remaining;
        subscribeDrawer();
      } else {
        showSection('login');
      }
    });

    // Event Listeners
    document.getElementById("btn-login-google").onclick = () => signInWithPopup(auth, provider);
    document.getElementById("btn-logout").onclick = () => signOut(auth);
    document.getElementById("btn-go-tasbih").onclick = () => showSection('tasbih');
    document.getElementById("btn-back-home").onclick = () => showSection('home');
    document.getElementById("btn-go-drawer").onclick = () => showSection('drawer');
    document.getElementById("btn-back-tasbih-drawer").onclick = () => showSection('tasbih');
    document.getElementById("btn-go-history").onclick = () => showSection('history');
    document.getElementById("btn-back-tasbih-history").onclick = () => showSection('tasbih');
    document.getElementById("btn-go-notes").onclick = () => showSection('notes');
    document.getElementById("btn-back-tasbih-notes").onclick = () => showSection('tasbih');

    document.getElementById("btn-add-laci").onclick = () => {
      addDoc(collection(db, "users", currentUser.uid, "drawer"), { title: "", notes: "", createdAt: Date.now() });
    };

    btnToggleFact.onclick = () => {
      factMode = !factMode;
      btnToggleFact.textContent = `Mode Fakta: ${factMode ? 'ON' : 'OFF'}`;
      btnToggleFact.classList.toggle("btn-active", factMode);
      
      if (factMode) {
        factDisplayBox.classList.add("show");
        if (allFacts.length > 0) {
          factTitleEl.textContent = `[ ${allFacts[currentFactIndex].title} ]`;
          factContentEl.textContent = "Sapu/Tekan skrin untuk sambung perkataan...";
        } else {
          factTitleEl.textContent = "";
          factContentEl.textContent = "Laci kosong. Sila tambah laci fakta.";
        }
      } else {
        factDisplayBox.classList.remove("show");
      }
    };

    // Full Screen Logic (Swipe Seesaw Sangat Sensitif - 5px)
    let touchY = 0;
    let lastDir = null;
    let isSwiping = false;
    const GAP = 5;

    document.addEventListener("touchstart", (e) => {
      if(!dom.tasbih.classList.contains('active')) return;
      if(e.target.closest('button') || e.target.closest('.topbar') || e.target.closest('#fact-display-box')) return;
      touchY = e.touches[0].clientY;
      isSwiping = false;
    }, {passive:true});

    document.addEventListener("touchmove", (e) => {
      if(!dom.tasbih.classList.contains('active') || e.target.closest('button') || e.target.closest('#fact-display-box')) return;
      const currentY = e.touches[0].clientY;
      const diff = currentY - touchY;
      if(Math.abs(diff) > 3) isSwiping = true;

      if(diff < -GAP && lastDir !== 'UP') {
        decrementTasbih(); lastDir = 'UP'; touchY = currentY;
        if(navigator.vibrate) navigator.vibrate(25);
      } else if(diff > GAP && lastDir !== 'DOWN') {
        decrementTasbih(); lastDir = 'DOWN'; touchY = currentY;
        if(navigator.vibrate) navigator.vibrate(25);
      }
    }, {passive:true});

    document.addEventListener("click", (e) => {
      if(!dom.tasbih.classList.contains('active') || e.target.closest('button') || e.target.closest('#fact-display-box') || isSwiping) return;
      decrementTasbih();
    });

  </script>
</body>
</html>
